sources:
  arxiv:
    enabled: true
    categories: ["cs.AI", "cs.CL", "cs.LG"]
    max_results: 10
  semantic_scholar:
    enabled: true
    max_results: 5
  google_scholar:
    enabled: false   # may be unstable

schedule:
  daily_ingestion_hour: 3
  timezone: "UTC"

processing:
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: "BAAI/bge-small-en-v1.5"

llm:
  model_name: "mistral:7b-instruct-v0.3-q4_K_M"
  ollama_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 1024

retrieval:
  dense_top_k: 20
  sparse_top_k: 10
  rerank_top_k: 5

storage:
  qdrant_path: "./qdrant_storage"
  papers_store: "./papers_store"
  sqlite_db: "./papers.db"

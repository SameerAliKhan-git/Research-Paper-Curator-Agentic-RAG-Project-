name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.6"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -q

      - name: Run API tests (mocked)
        run: uv run pytest tests/api/ -v --tb=short -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-api:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e ENVIRONMENT=testing \
            -e OLLAMA_HOST=http://host.docker.internal:11434 \
            -e OPENSEARCH__HOST=http://host.docker.internal:9200 \
            -e REDIS__HOST=host.docker.internal \
            -e POSTGRES_DATABASE_URL=postgresql://rag_user:rag_password@host.docker.internal:5432/rag_db \
            rag-api:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8000/api/v1/health || (docker logs test-api && exit 1)
          docker stop test-api
